###############################################################################
## 00-common.conf  —  applies to EVERY node in the fort.wow.dev pool
###############################################################################

## ── Pool identity ────────────────────────────────────────────────────────────
CONDOR_HOST       = mgr.fort.wow.dev
COLLECTOR_HOST    = $(CONDOR_HOST)

## UID_DOMAIN must be the exact same string on every node.
## Mismatch silently breaks run_as_owner credential lookup.
UID_DOMAIN        = fort.wow.dev
FILESYSTEM_DOMAIN = fort.wow.dev
TRUST_UID_DOMAIN  = True

## credd runs on the CM (mgr). Must be a Windows machine.
CREDD_HOST        = $(CONDOR_HOST)
CREDD_CACHE_LOCALLY = True

## ── Authentication ───────────────────────────────────────────────────────────
## PASSWORD – Pool shared secret; primary method for daemon-to-daemon auth.
## NTSSPI   – Windows domain Kerberos/NTLM; secondary for domain user tools.
## PASSWORD must come first: condor service runs as a local account, so
## NTSSPI from execute/submit nodes authenticates as ANONYMOUS (no domain
## Kerberos ticket), which gets cached as denied before PASSWORD is tried.
SEC_DEFAULT_AUTHENTICATION          = REQUIRED
SEC_DEFAULT_ENCRYPTION              = REQUIRED
SEC_DEFAULT_INTEGRITY               = REQUIRED
SEC_DEFAULT_AUTHENTICATION_METHODS = IDTOKENS, PASSWORD, NTSSPI

## CONFIG-level security (needed for condor_store_cred add -c to work).
SEC_CONFIG_AUTHENTICATION           = REQUIRED
SEC_CONFIG_ENCRYPTION               = REQUIRED
SEC_CONFIG_INTEGRITY                = REQUIRED
SEC_CONFIG_AUTHENTICATION_METHODS  = IDTOKENS, PASSWORD, NTSSPI

## DAEMON-level (daemon-to-daemon calls use PASSWORD for credd path).
SEC_DAEMON_AUTHENTICATION_METHODS  = IDTOKENS, PASSWORD, NTSSPI

## ── Authorization ────────────────────────────────────────────────────────────
## condor_pool@$(UID_DOMAIN)  = identity established via pool PASSWORD auth.
## *@fort.wow.dev             = any domain user/machine account via NTSSPI (DNS domain).
## *@fortwow                  = NTSSPI using NetBIOS domain name (Windows maps fort.wow.dev -> fortwow).
ALLOW_READ        = *
ALLOW_WRITE       = condor_pool@fort.wow.dev/*, *@fort.wow.dev, *@fortwow
ALLOW_DAEMON      = condor_pool@fort.wow.dev/*, *@fort.wow.dev/*, *@fortwow/*
ALLOW_NEGOTIATOR  = condor_pool@fort.wow.dev/$(CONDOR_HOST), *@fort.wow.dev/$(CONDOR_HOST), *@fortwow/$(CONDOR_HOST)
ALLOW_ADMINISTRATOR = Administrator@fort.wow.dev/*, condor_pool@fort.wow.dev/*, *@$(UID_DOMAIN)/*, *@fortwow/*
ALLOW_CONFIG      = Administrator@fort.wow.dev/*, condor_pool@fort.wow.dev/*, *@$(UID_DOMAIN)/*, *@fortwow/*

## ── Job execution policy ─────────────────────────────────────────────────────
START     = True
SUSPEND   = False
CONTINUE  = True
PREEMPT   = False
KILL      = False

## ── Logging ──────────────────────────────────────────────────────────────────
MAX_DEFAULT_LOG = 50000000
