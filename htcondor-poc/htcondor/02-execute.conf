###############################################################################
## 02-execute.conf  —  Execute node  (compute-0.fort.wow.dev)
##
## IMPORTANT: CREDD must come before STARTD in DAEMON_LIST.
## HTCondor sets LocalCredd in the startd ClassAd only if the CREDD
## is already registered when the startd starts. Wrong order = LocalCredd=UNDEF
## = run_as_owner jobs go on hold with "Could not locate valid credential".
###############################################################################

DAEMON_LIST = MASTER, CREDD, STARTD

## Allow the starter to impersonate the submitting user (run_as_owner).
## The pool password must be stored on this node so the starter can
## authenticate to the credd on mgr and fetch the user's credential.
STARTER_ALLOW_RUNAS_OWNER = True
CREDD_CACHE_LOCALLY = True

## Execute node local CREDD acts as a proxy/cache for the central credd.
## This reduces load on the CM and speeds up job starts.
CREDD_HOST = mgr.fort.wow.dev

## Prevent the local CREDD from advertising to the central collector with
## Name=mgr.fort.wow.dev, which would override the real CM CREDD's entry
## and cause condor_store_cred to connect to the wrong daemon.
## The STARTD still discovers LocalCredd via the local master — not the collector.
CREDD.COLLECTOR_HOST = 127.0.0.1
