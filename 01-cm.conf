###############################################################################
## 01-cm.conf  —  Central Manager + CREDD  (mgr.fort.wow.dev)
##
## NOTE ON DAEMON ORDER: CREDD must appear before STARTD in DAEMON_LIST
## so that LocalCredd is populated in the startd ClassAd on startup.
## On the CM we don't run STARTD at all, so order is academic here —
## but on execute nodes it matters (see 02-execute.conf).
###############################################################################

DAEMON_LIST = MASTER, COLLECTOR, NEGOTIATOR, CREDD

## ── CREDD configuration ──────────────────────────────────────────────────────
CREDD_LOG   = $(LOG)/CreddLog
MAX_CREDD_LOG = 50000000
CREDD_DEBUG = D_COMMAND D_SECURITY

## The credd only accepts PASSWORD-authenticated connections for the
## credential-fetch path used by execute-node starters.
CREDD.SEC_DEFAULT_AUTHENTICATION          = REQUIRED
CREDD.SEC_DEFAULT_ENCRYPTION              = REQUIRED
CREDD.SEC_DEFAULT_INTEGRITY               = REQUIRED

## Two auth methods on the credd:
##   PASSWORD  – for execute nodes fetching user credentials (DAEMON path)
##   NTSSPI    – for submit nodes storing user credentials (CONFIG path)
CREDD.SEC_DEFAULT_AUTHENTICATION_METHODS  = NTSSPI, PASSWORD
CREDD.SEC_DAEMON_AUTHENTICATION_METHODS   = PASSWORD

## Only condor_pool identity (i.e., nodes with the correct pool password)
## may fetch stored credentials.
CREDD.ALLOW_DAEMON = condor_pool@fort.wow.dev

## Submit nodes (NTSSPI as domain user) may store credentials.
CREDD.ALLOW_CONFIG = *@fort.wow.dev
