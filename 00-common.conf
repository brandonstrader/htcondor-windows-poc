###############################################################################
## 00-common.conf  —  applies to EVERY node in the fort.wow.dev pool
###############################################################################

## ── Pool identity ────────────────────────────────────────────────────────────
CONDOR_HOST       = mgr.fort.wow.dev
COLLECTOR_HOST    = $(CONDOR_HOST)

## UID_DOMAIN must be the exact same string on every node.
## Mismatch silently breaks run_as_owner credential lookup.
UID_DOMAIN        = fort.wow.dev
FILESYSTEM_DOMAIN = fort.wow.dev
TRUST_UID_DOMAIN  = True

## credd runs on the CM (mgr). Must be a Windows machine.
CREDD_HOST        = $(CONDOR_HOST)
CREDD_CACHE_LOCALLY = True

## ── Authentication ───────────────────────────────────────────────────────────
## NTSSPI   – Windows domain (Kerberos/NTLM); covers daemon-to-daemon auth.
## PASSWORD – Pool shared secret; required for execute→credd credential fetch.
## Order matters: NTSSPI is tried first; PASSWORD is the fallback for credd.
SEC_DEFAULT_AUTHENTICATION          = REQUIRED
SEC_DEFAULT_ENCRYPTION              = REQUIRED
SEC_DEFAULT_INTEGRITY               = REQUIRED
SEC_DEFAULT_AUTHENTICATION_METHODS = NTSSPI, PASSWORD

## CONFIG-level security (needed for condor_store_cred add -c to work).
SEC_CONFIG_AUTHENTICATION           = REQUIRED
SEC_CONFIG_ENCRYPTION               = REQUIRED
SEC_CONFIG_INTEGRITY                = REQUIRED
SEC_CONFIG_AUTHENTICATION_METHODS  = NTSSPI, PASSWORD

## DAEMON-level (daemon-to-daemon calls also need PASSWORD for credd path).
SEC_DAEMON_AUTHENTICATION_METHODS  = NTSSPI, PASSWORD

## ── Authorization ────────────────────────────────────────────────────────────
## condor_pool@$(UID_DOMAIN)  = identity established via pool PASSWORD auth.
## *@fort.wow.dev             = any domain user/machine account via NTSSPI.
ALLOW_READ        = *
ALLOW_WRITE       = *@fort.wow.dev
ALLOW_DAEMON      = condor_pool@fort.wow.dev/*, *@fort.wow.dev/*
ALLOW_NEGOTIATOR  = condor_pool@fort.wow.dev/$(CONDOR_HOST), *@fort.wow.dev/$(CONDOR_HOST)
ALLOW_ADMINISTRATOR = Administrator@fort.wow.dev/*, condor_pool@fort.wow.dev/*
ALLOW_CONFIG      = Administrator@fort.wow.dev/*

## ── Job execution policy ─────────────────────────────────────────────────────
START     = True
SUSPEND   = False
CONTINUE  = True
PREEMPT   = False
KILL      = False

## ── Logging ──────────────────────────────────────────────────────────────────
MAX_DEFAULT_LOG = 50000000
